global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'gst-copilot-agent'
    metrics_path: /metrics
    scheme: https

    static_configs:
      - targets:
          - gst-copilot-agent.onrender.com

remote_write:
  - url: https://prometheus-prod-43-prod-ap-south-1.grafana.net/api/prom/push

    basic_auth:
      username: 3230150
      password: ${GRAFANA_TOKEN}